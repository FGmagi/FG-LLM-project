<!DOCTYPE html>
<html>
<head>
    <title>果农助手 - 智能农业咨询系统</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>果农助手</h1>
            <p>智能农业咨询系统</p>
            <div class="status-indicator disconnected" id="statusIndicator">
                ● 后端服务未连接
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-box" id="chatBox">
                <!-- 欢迎消息将通过AI回复显示 -->
            </div>
            
            <div class="input-container">
                <input type="text" id="userInput" placeholder="请输入您的问题...">
                <button id="sendBtn">发送</button>
            </div>
            
            <div class="quick-actions">
                <button class="quick-action-btn" onclick="quickAction('浇水灌溉')">💧 浇水灌溉</button>
                <button class="quick-action-btn" onclick="quickAction('如何施肥？')">🌿 如何施肥？</button>
                <button class="quick-action-btn" onclick="quickAction('温度怎么样？')">🌡️ 温度管理</button>
                <button class="quick-action-btn" onclick="quickAction('病虫害防治')">🐛 病虫害防治</button>
                <button class="quick-action-btn" onclick="quickAction('土壤管理')">🧪 土壤管理</button>
            </div>
        </div>
    </div>
    
    <script>
        async function updateStatus() {
            try {
                const r = await fetch('/status');
                const j = await r.json();
                const statusIndicator = document.getElementById('statusIndicator');
                if (j.data_file_exists) {
                    statusIndicator.textContent = '● 已连接（数据文件存在）';
                    statusIndicator.className = 'status-indicator connected';
                } else {
                    statusIndicator.textContent = '● 已连接（但数据文件缺失）';
                    statusIndicator.className = 'status-indicator disconnected';
                }
            } catch (e) {
                // ignore
            }
        }

        function addMessageToChat(sender, message) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            
            if (sender === 'user') {
                messageDiv.className = 'user-msg';
                messageDiv.textContent = '👤 ' + message;
            } else {
                messageDiv.className = 'ai-msg';
                messageDiv.innerHTML = '🤖 ' + message.replace(/\n/g, '<br>');
            }
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            addMessageToChat('user', message);
            input.value = '';
            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: message})
                });
                const j = await resp.json();
                addMessageToChat('ai', j.response);
            } catch (e) {
                addMessageToChat('ai', '❌ 抱歉，服务暂时不可用，请稍后重试。');
            }
        }
        
        function quickAction(action) {
            document.getElementById('userInput').value = action;
            sendMessage();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus();
            setTimeout(() => {
                addMessageToChat('ai', '欢迎使用果农助手！请输入问题，例如："要不要浇水？" 或使用下方快捷按钮。');
            }, 300);
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>
</body>
</html>
